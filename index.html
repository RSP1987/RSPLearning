<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSP Learning - Content Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .active-tab { border-bottom: 4px solid #1e40af; color: #1e40af; background-color: #eff6ff; }
        .dark .active-tab { border-bottom: 4px solid #60a5fa; color: #60a5fa; background-color: #1e293b; }
        /* Markdown rendering styles */
        #file-viewer-area h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 1rem; color: #1e40af; }
        #file-viewer-area h2 { font-size: 1.4rem; font-weight: 700; margin-top: 1.5rem; color: #1e3a8a; }
        #file-viewer-area p { margin-bottom: 1rem; line-height: 1.7; }
        #file-viewer-area code { background: #f1f5f9; padding: 2px 5px; border-radius: 4px; font-family: monospace; color: #be185d; }
        .dark #file-viewer-area code { background: #334155; color: #fda4af; }
        #file-viewer-area pre { background: #1e293b; color: #f8fafc; padding: 1rem; border-radius: 8px; overflow-x: auto; margin-bottom: 1.5rem; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors">

    <header class="bg-white dark:bg-gray-800 pt-8 pb-6 text-center shadow-sm relative">
        <button onclick="toggleDarkMode()" class="absolute top-5 right-5 p-2 rounded-full bg-gray-100 dark:bg-gray-700">
            <i id="theme-icon" class="fas fa-moon text-xl"></i>
        </button>
        <h1 class="text-3xl font-extrabold text-blue-900 dark:text-blue-400">RSP Learning Portal</h1>
    </header>

    <nav class="bg-white dark:bg-gray-800 border-b dark:border-gray-700 flex justify-center sticky top-0 z-50 shadow-sm">
        <button onclick="showTab('devops')" id="btn-devops" class="py-4 px-6 font-bold active-tab">COURSES</button>
        <button onclick="showTab('interview')" id="btn-interview" class="py-4 px-6 font-bold text-gray-500 dark:text-gray-400">INTERVIEW Q&A</button>
    </nav>

    <main class="max-w-5xl mx-auto p-6">
        
        <div id="devops" class="tab-content active">
            <div class="grid md:grid-cols-2 gap-4">
                <a href="https://youtube.com/playlist?list=PLdpzxOOAlwvIKMhk8WhzN1pYoJ1YU8Csa" target="_blank" class="p-6 bg-white dark:bg-gray-800 rounded-xl border dark:border-gray-700 flex items-center hover:shadow-lg transition">
                    <i class="fab fa-youtube text-red-600 mr-4 text-3xl"></i>
                    <span class="font-bold text-lg">DevOps Full Course</span>
                </a>
            </div>
        </div>

        <div id="interview" class="tab-content">
            <div id="list-view">
                <h2 class="text-2xl font-bold mb-6 border-l-4 border-green-500 pl-4">Study Material</h2>
                <div id="file-list-container" class="grid gap-4">
                    <p class="text-gray-400 italic">Scanning GitHub...</p>
                </div>
            </div>

            <div id="content-view" class="hidden">
                <button onclick="backToList()" class="mb-6 text-blue-600 dark:text-blue-400 font-bold hover:underline">
                    <i class="fas fa-arrow-left mr-2"></i> Back to List
                </button>
                <div class="bg-white dark:bg-gray-800 p-6 md:p-10 rounded-2xl shadow-xl border dark:border-gray-700">
                    <div id="file-viewer-area"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = 'https://api.github.com/repos/RSP1987/RSPLearning/contents/devops-training-material-main/kubernetes';

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('active-tab');
                b.classList.add('text-gray-500', 'dark:text-gray-400');
            });
            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active-tab');
            if(tabId === 'interview') fetchFileList();
        }

        async function fetchFileList() {
            const container = document.getElementById('file-list-container');
            try {
                const response = await fetch(API_URL);
                const files = await response.json();
                container.innerHTML = "";
                
                files.forEach(file => {
                    if (file.name.match(/\.(md|pdf|txt)$/i)) {
                        const isPdf = file.name.endsWith('.pdf');
                        const card = document.createElement('div');
                        card.className = "p-4 bg-white dark:bg-gray-800 border dark:border-gray-700 rounded-xl flex justify-between items-center hover:border-blue-500 cursor-pointer transition";
                        
                        // If it's MD/TXT, we view it in the app. If PDF, we open link.
                        const action = isPdf ? `window.open('${file.download_url}')` : `viewFileContent('${file.download_url}', '${file.name}')`;

                        card.innerHTML = `
                            <div class="flex items-center" onclick="${action}">
                                <i class="fas ${isPdf ? 'fa-file-pdf text-red-500' : 'fa-file-alt text-blue-500'} text-xl mr-4"></i>
                                <span class="font-bold">${file.name}</span>
                            </div>
                            <span class="text-xs text-gray-400 font-mono">${isPdf ? 'PDF' : 'DOC'}</span>
                        `;
                        container.appendChild(card);
                    }
                });
            } catch (e) { container.innerHTML = "Error loading files."; }
        }

        async function viewFileContent(url, name) {
            document.getElementById('list-view').classList.add('hidden');
            document.getElementById('content-view').classList.remove('hidden');
            const viewer = document.getElementById('file-viewer-area');
            viewer.innerHTML = '<p class="text-center py-10"><i class="fas fa-spinner fa-spin mr-2"></i> Reading content...</p>';

            try {
                const response = await fetch(url);
                const text = await response.text();
                // Render as Markdown if .md, otherwise plain text
                viewer.innerHTML = name.endsWith('.md') ? marked.parse(text) : `<pre class="whitespace-pre-wrap">${text}</pre>`;
            } catch (e) { viewer.innerHTML = "Error reading file content."; }
        }

        function backToList() {
            document.getElementById('list-view').classList.remove('hidden');
            document.getElementById('content-view').classList.add('hidden');
        }

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            document.getElementById('theme-icon').className = isDark ? "fas fa-sun text-yellow-400" : "fas fa-moon text-gray-600";
        }
    </script>
</body>
</html>
