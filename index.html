<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSP Learning Portal - Read Only</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .active-tab { border-bottom: 4px solid #1e40af; color: #1e40af; background-color: #eff6ff; }
        .dark .active-tab { border-bottom: 4px solid #60a5fa; color: #60a5fa; background-color: #1e293b; }
        
        /* Markdown/Text Viewer Styling */
        #file-viewer-area h1 { font-size: 1.8rem; font-weight: 800; color: #1e40af; margin-bottom: 1rem; }
        #file-viewer-area h2 { font-size: 1.4rem; font-weight: 700; color: #1e3a8a; margin-top: 1.5rem; }
        #file-viewer-area p { line-height: 1.7; margin-bottom: 1rem; }
        
        /* PDF Embedding Frame */
        .pdf-frame { width: 100%; height: 80vh; border: none; border-radius: 8px; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors">

    <header class="bg-white dark:bg-gray-800 pt-8 pb-6 text-center shadow-sm relative">
        <button onclick="toggleDarkMode()" class="absolute top-5 right-5 p-2 rounded-full bg-gray-100 dark:bg-gray-700">
            <i id="theme-icon" class="fas fa-moon text-xl"></i>
        </button>
        <h1 class="text-3xl font-extrabold text-blue-900 dark:text-blue-400">RSP Learning Portal</h1>
    </header>

    <nav class="bg-white dark:bg-gray-800 border-b dark:border-gray-700 flex justify-center sticky top-0 z-50 overflow-x-auto shadow-sm">
        <button onclick="showTab('devops')" id="btn-devops" class="py-4 px-6 font-bold active-tab text-sm md:text-base">DEVOPS</button>
        <button onclick="showTab('azure')" id="btn-azure" class="py-4 px-6 font-bold text-gray-500 dark:text-gray-400 text-sm md:text-base">AZURE</button>
        <button onclick="showTab('aws')" id="btn-aws" class="py-4 px-6 font-bold text-gray-500 dark:text-gray-400 text-sm md:text-base">AWS</button>
        <button onclick="showTab('interview')" id="btn-interview" class="py-4 px-6 font-bold text-gray-500 dark:text-gray-400 text-sm md:text-base">INTERVIEW Q&A</button>
    </nav>

    <main class="max-w-5xl mx-auto p-6">
        
        <div id="interview" class="tab-content">
            <div id="list-view">
                <h2 class="text-2xl font-bold mb-6 border-l-4 border-green-500 pl-4">Training Materials</h2>
                <div id="file-list-container" class="grid gap-4">
                    <p class="text-gray-400 italic">Syncing with GitHub...</p>
                </div>
            </div>

            <div id="content-view" class="hidden">
                <div class="flex justify-between items-center mb-6">
                    <button onclick="backToList()" class="text-blue-600 dark:text-blue-400 font-bold hover:underline">
                        <i class="fas fa-arrow-left mr-2"></i> Back to List
                    </button>
                    <span id="viewing-filename" class="text-xs font-mono text-gray-500"></span>
                </div>
                <div class="bg-white dark:bg-gray-800 p-4 md:p-8 rounded-2xl shadow-xl border dark:border-gray-700">
                    <div id="file-viewer-area"></div>
                </div>
            </div>
        </div>

        <div id="devops" class="tab-content active"><p class="text-center py-10">DevOps Content Here</p></div>
        <div id="azure" class="tab-content"><p class="text-center py-10">Azure Content Here</p></div>
        <div id="aws" class="tab-content"><p class="text-center py-10">AWS Content Here</p></div>
    </main>

    <script>
        const API_URL = 'https://api.github.com/repos/RSP1987/RSPLearning/contents/devops-training-material-main/kubernetes';

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('active-tab');
                b.classList.add('text-gray-500', 'dark:text-gray-400');
            });
            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active-tab');
            if(tabId === 'interview') fetchFileList();
        }

        async function fetchFileList() {
            const container = document.getElementById('file-list-container');
            try {
                const response = await fetch(API_URL);
                const files = await response.json();
                container.innerHTML = "";
                
                files.forEach(file => {
                    if (file.name.match(/\.(md|pdf|txt)$/i)) {
                        const isPdf = file.name.endsWith('.pdf');
                        const card = document.createElement('div');
                        card.className = "p-5 bg-white dark:bg-gray-800 border dark:border-gray-700 rounded-xl flex items-center hover:bg-blue-50 dark:hover:bg-gray-700 cursor-pointer transition shadow-sm border-l-4 border-l-transparent hover:border-l-blue-500";
                        
                        card.onclick = () => viewFileContent(file.download_url, file.name);

                        card.innerHTML = `
                            <i class="fas ${isPdf ? 'fa-file-pdf text-red-500' : 'fa-file-alt text-blue-500'} text-2xl mr-4"></i>
                            <div class="flex-1">
                                <h4 class="font-bold text-gray-800 dark:text-gray-200">${file.name}</h4>
                                <p class="text-xs text-gray-400 uppercase">Read Only Mode</p>
                            </div>
                            <i class="fas fa-chevron-right text-gray-300"></i>
                        `;
                        container.appendChild(card);
                    }
                });
            } catch (e) { container.innerHTML = "Error syncing files."; }
        }

        async function viewFileContent(url, name) {
            document.getElementById('list-view').classList.add('hidden');
            document.getElementById('content-view').classList.remove('hidden');
            document.getElementById('viewing-filename').innerText = name;
            const viewer = document.getElementById('file-viewer-area');
            viewer.innerHTML = '<p class="text-center py-10">Loading viewer...</p>';

            if (name.endsWith('.pdf')) {
                // PDF Viewer using iframe (Read-Only approach)
                viewer.innerHTML = `<iframe src="${url}#toolbar=0" class="pdf-frame"></iframe>`;
            } else {
                // Text/Markdown Viewer
                try {
                    const response = await fetch(url);
                    const text = await response.text();
                    viewer.innerHTML = name.endsWith('.md') ? marked.parse(text) : `<pre class="whitespace-pre-wrap font-mono text-sm p-4 bg-gray-50 dark:bg-gray-900 rounded">${text}</pre>`;
                } catch (e) { viewer.innerHTML = "Error loading content."; }
            }
        }

        function backToList() {
            document.getElementById('list-view').classList.remove('hidden');
            document.getElementById('content-view').classList.add('hidden');
        }

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            document.getElementById('theme-icon').className = isDark ? "fas fa-sun text-yellow-400" : "fas fa-moon text-gray-600";
        }
    </script>
</body>
</html>
