<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSP Learning Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .active-tab { border-bottom: 4px solid #1e40af; color: #1e40af; background-color: #eff6ff; }
        .dark .active-tab { border-bottom: 4px solid #60a5fa; color: #60a5fa; background-color: #1e293b; }
        .pdf-frame { width: 100%; height: 75vh; border: none; border-radius: 8px; }
        #file-viewer-area h1 { font-size: 1.8rem; font-weight: 800; color: #1e40af; margin-bottom: 1rem; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors">

    <header class="bg-white dark:bg-gray-800 pt-8 pb-6 text-center shadow-sm relative">
        <button onclick="toggleDarkMode()" class="absolute top-5 right-5 p-2 rounded-full bg-gray-100 dark:bg-gray-700">
            <i id="theme-icon" class="fas fa-moon text-xl"></i>
        </button>
        <h1 class="text-3xl font-extrabold text-blue-900 dark:text-blue-400">RSP Learning Portal</h1>
    </header>

    <nav class="bg-white dark:bg-gray-800 border-b dark:border-gray-700 flex justify-center sticky top-0 z-50 overflow-x-auto shadow-sm">
        <button onclick="showTab('devops')" id="btn-devops" class="py-4 px-6 font-bold active-tab">DEVOPS</button>
        <button onclick="showTab('azure')" id="btn-azure" class="py-4 px-6 font-bold text-gray-500 dark:text-gray-400">AZURE</button>
        <button onclick="showTab('aws')" id="btn-aws" class="py-4 px-6 font-bold text-gray-500 dark:text-gray-400">AWS</button>
        <button onclick="showTab('gcp')" id="btn-gcp" class="py-4 px-6 font-bold text-gray-500 dark:text-gray-400">GCP</button>
        <button onclick="showTab('projects')" id="btn-projects" class="py-4 px-6 font-bold text-gray-500 dark:text-gray-400">PROJECTS</button>
        <button onclick="showTab('interview')" id="btn-interview" class="py-4 px-6 font-bold text-gray-500 dark:text-gray-400">INTERVIEW Q&A</button>
    </nav>

    <main class="max-w-5xl mx-auto p-6">
        
        <div id="devops" class="tab-content active">
            <div class="grid md:grid-cols-2 gap-4">
                <a href="https://youtube.com/playlist?list=PLdpzxOOAlwvIKMhk8WhzN1pYoJ1YU8Csa" target="_blank" class="p-6 bg-white dark:bg-gray-800 rounded-xl border dark:border-gray-700 flex items-center hover:shadow-lg transition">
                    <i class="fab fa-youtube text-red-600 mr-4 text-3xl"></i>
                    <span class="font-bold text-lg">DevOps Full Course</span>
                </a>
            </div>
        </div>

        <div id="azure" class="tab-content">
            <div class="grid md:grid-cols-2 gap-4">
                <a href="https://www.youtube.com/playlist?list=PLdpzxOOAlwvIcxgCUyBHVOcWs0Krjx9xR" target="_blank" class="p-6 bg-white dark:bg-gray-800 rounded-xl border dark:border-gray-700 flex items-center hover:shadow-lg transition">
                    <i class="fab fa-microsoft text-blue-500 mr-4 text-3xl"></i>
                    <span class="font-bold text-lg">Azure DevOps Course</span>
                </a>
            </div>
        </div>

        <div id="aws" class="tab-content">
            <div class="grid md:grid-cols-2 gap-4">
                <a href="https://www.youtube.com/playlist?list=PLdpzxOOAlwvLNOxX0RfndiYSt1Le9azze" target="_blank" class="p-6 bg-white dark:bg-gray-800 rounded-xl border dark:border-gray-700 flex items-center hover:shadow-lg transition">
                    <i class="fab fa-aws text-orange-500 mr-4 text-3xl"></i>
                    <span class="font-bold text-lg">AWS Solutions Architect</span>
                </a>
            </div>
        </div>

        <div id="gcp" class="tab-content">
            <div class="grid md:grid-cols-2 gap-4">
                <a href="https://www.youtube.com/watch?v=N5rXROueKhw&list=PLdpzxOOAlwvL4VhhpTiIUr-i_djrXGB22" target="_blank" class="p-6 bg-white dark:bg-gray-800 rounded-xl border dark:border-gray-700 flex items-center hover:shadow-lg transition">
                    <i class="fab fa-google text-green-500 mr-4 text-3xl"></i>
                    <span class="font-bold text-lg">GCP Professional Engineer</span>
                </a>
            </div>
        </div>

        <div id="projects" class="tab-content">
            <div class="grid md:grid-cols-2 gap-4">
                <div class="p-6 bg-white dark:bg-gray-800 rounded-xl border dark:border-gray-700">
                    <h4 class="font-bold text-lg mb-2"><i class="fas fa-tasks text-purple-500 mr-2"></i> Real-time Projects</h4>
                    <p class="text-sm text-gray-500">Coming soon: End-to-end CI/CD pipelines & Kubernetes deployments.</p>
                </div>
            </div>
        </div>

        <div id="interview" class="tab-content">
            <div id="list-view">
                <h2 class="text-2xl font-bold mb-6 border-l-4 border-green-500 pl-4">Read-Only Materials</h2>
                <div id="file-list-container" class="grid gap-4">
                    <p class="text-gray-400 italic">Connecting to GitHub...</p>
                </div>
            </div>
            <div id="content-view" class="hidden">
                <button onclick="backToList()" class="mb-6 text-blue-600 font-bold hover:underline"><i class="fas fa-arrow-left mr-2"></i> Back to List</button>
                <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-xl border dark:border-gray-700" id="file-viewer-area"></div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = 'https://api.github.com/repos/RSP1987/RSPLearning/contents/devops-training-material-main/kubernetes';

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('active-tab');
                b.classList.add('text-gray-500', 'dark:text-gray-400');
            });
            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active-tab');
            if(tabId === 'interview') fetchFileList();
        }

        async function fetchFileList() {
            const container = document.getElementById('file-list-container');
            try {
                const response = await fetch(API_URL);
                const files = await response.json();
                container.innerHTML = "";
                files.forEach(file => {
                    if (file.name.match(/\.(md|pdf|txt)$/i)) {
                        const isPdf = file.name.endsWith('.pdf');
                        const card = document.createElement('div');
                        card.className = "p-4 bg-white dark:bg-gray-800 border dark:border-gray-700 rounded-xl flex items-center hover:border-blue-500 cursor-pointer transition shadow-sm";
                        card.onclick = () => viewFileContent(file.download_url, file.name);
                        card.innerHTML = `<i class="fas ${isPdf ? 'fa-file-pdf text-red-500' : 'fa-file-alt text-blue-500'} text-xl mr-4"></i><span class="font-bold">${file.name}</span>`;
                        container.appendChild(card);
                    }
                });
            } catch (e) { container.innerHTML = "Error loading files."; }
        }

        async function viewFileContent(url, name) {
            document.getElementById('list-view').classList.add('hidden');
            document.getElementById('content-view').classList.remove('hidden');
            const viewer = document.getElementById('file-viewer-area');
            if (name.endsWith('.pdf')) {
                // PDF Viewer (Read-only iframe)
                viewer.innerHTML = `<iframe src="${url}#toolbar=0" class="pdf-frame"></iframe>`;
            } else {
                const response = await fetch(url);
                const text = await response.text();
                viewer.innerHTML = name.endsWith('.md') ? marked.parse(text) : `<pre class="whitespace-pre-wrap">${text}</pre>`;
            }
        }

        function backToList() {
            document.getElementById('list-view').classList.remove('hidden');
            document.getElementById('content-view').classList.add('hidden');
        }

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            document.getElementById('theme-icon').className = isDark ? "fas fa-sun text-yellow-400" : "fas fa-moon text-gray-600";
        }
    </script>
</body>
</html>
